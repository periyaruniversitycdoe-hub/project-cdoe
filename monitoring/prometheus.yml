# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Configuration — PhD ERP
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'phd-erp'
    environment: 'production'

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Scrape Docker service healthcheck endpoints
  - job_name: 'phd-backends'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'student-backend:5000'
          - 'admin-backend:5001'
          - 'supervisor-backend:5002'
          - 'center-backend:5003'
