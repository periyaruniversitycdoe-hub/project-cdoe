# ═════════════════════════════════════════════════════════════════════════════
# PhD Admission Management System — Nginx Master Configuration
# Production-grade reverse proxy with security hardening
# ═════════════════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;   # Match number of CPU cores
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format  json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent"'
      '}';

    access_log  /var/log/nginx/access.log  json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens   off;  # Hide nginx version

    # ── Buffers ───────────────────────────────────────────────────────────────
    client_body_buffer_size     128k;
    client_max_body_size        50m;   # Max file upload size
    client_header_buffer_size   1k;
    large_client_header_buffers 4 16k;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    client_body_timeout    60s;
    client_header_timeout  60s;
    send_timeout           60s;
    proxy_connect_timeout  60s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ── SSL Global Settings ───────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    # Auth endpoints: strict (20 req/min per IP)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
    # API endpoints: generous (300 req/min per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=300r/m;
    # General web: 100 req/min
    limit_req_zone $binary_remote_addr zone=web_limit:10m  rate=100r/m;
    # File uploads: 10 per min
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;
    # Payment endpoints: 5 per min (anti-fraud)
    limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=5r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Proxy cache ───────────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m
                     max_size=100m inactive=60m use_temp_path=off;

    # ── Security Headers (applied globally via map) ───────────────────────────
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';";
    }

    # ── Upstream Definitions ──────────────────────────────────────────────────
    upstream student_backend {
        server student-backend:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    upstream admin_backend {
        server admin-backend:5001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    upstream supervisor_backend {
        server supervisor-backend:5002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    upstream center_backend {
        server center-backend:5003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    upstream notification_service {
        server notification-service:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream student_ui {
        server student-ui:8080;
        keepalive 16;
    }
    upstream admin_ui {
        server admin-ui:8080;
        keepalive 16;
    }
    upstream supervisor_ui {
        server supervisor-ui:8080;
        keepalive 16;
    }
    upstream center_ui {
        server center-ui:8080;
        keepalive 16;
    }

    # ── Include virtual host configs ──────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
