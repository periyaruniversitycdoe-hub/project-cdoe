# ============================================================================
#  Periyar University — PhD Research Portal
#  Nginx configuration for Docker Compose deployment
#
#  Docker service names (defined in docker-compose.yml):
#    student_backend   : 5000
#    admin_backend     : 5001
#    supervisor_backend: 5002
#    center_backend    : 5003
#    portal-ui         : 8080  (portal-dashboard Vite build, served by nginx/node)
#    admin-ui          : 8080
#    student-ui        : 8080
#    supervisor-ui     : 8080
#    center-ui         : 8080
#
#  Place this file at  nginx/conf.d/phd-portal.conf
#  and include it from your nginx.conf:   include /etc/nginx/conf.d/*.conf;
# ============================================================================

limit_req_zone $binary_remote_addr zone=docker_auth:10m    rate=20r/m;
limit_req_zone $binary_remote_addr zone=docker_api:10m     rate=300r/m;
limit_req_zone $binary_remote_addr zone=docker_upload:10m  rate=10r/m;
limit_req_zone $binary_remote_addr zone=docker_payment:10m rate=5r/m;

upstream student_be  { server student_backend:5000;   keepalive 16; }
upstream admin_be    { server admin_backend:5001;     keepalive 16; }
upstream supervisor_be { server supervisor_backend:5002; keepalive 16; }
upstream center_be   { server center_backend:5003;    keepalive 16; }

upstream portal_ui      { server portal-ui:8080;      keepalive 8; }
upstream admin_ui       { server admin-ui:8080;        keepalive 8; }
upstream student_ui     { server student-ui:8080;      keepalive 8; }
upstream supervisor_ui  { server supervisor-ui:8080;   keepalive 8; }
upstream center_ui      { server center-ui:8080;       keepalive 8; }

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN   always;
    add_header X-Content-Type-Options nosniff      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── API routes (before SPA catch-alls) ───────────────────────────────────

    location /student/api/auth/ {
        limit_req zone=docker_auth burst=5 nodelay;
        proxy_pass         http://student_be/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /student/api/payment/ {
        limit_req zone=docker_payment burst=3 nodelay;
        proxy_pass         http://student_be/api/payment/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_request_buffering off;
    }

    location /student/api/upload {
        limit_req zone=docker_upload burst=5 nodelay;
        client_max_body_size 20m;
        proxy_pass         http://student_be/api/upload;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    location /student/api/ {
        limit_req zone=docker_api burst=50 nodelay;
        proxy_pass         http://student_be/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "keep-alive";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
    }

    location /admin/api/auth/ {
        limit_req zone=docker_auth burst=5 nodelay;
        proxy_pass         http://admin_be/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /admin/api/upload {
        limit_req zone=docker_upload burst=5 nodelay;
        client_max_body_size 20m;
        proxy_pass         http://admin_be/api/upload;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    location /admin/api/ {
        limit_req zone=docker_api burst=50 nodelay;
        proxy_pass         http://admin_be/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "keep-alive";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
    }

    location /supervisor/api/ {
        limit_req zone=docker_api burst=30 nodelay;
        proxy_pass         http://supervisor_be/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /center/api/ {
        limit_req zone=docker_api burst=30 nodelay;
        proxy_pass         http://center_be/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Uploaded files
    location /uploads/ {
        proxy_pass http://student_be/uploads/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA routes ───────────────────────────────────────────────────────────

    location ^~ /admin {
        proxy_pass         http://admin_ui;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_intercept_errors on;
        error_page 404 = @admin_spa;
    }

    location @admin_spa {
        proxy_pass http://admin_ui;
        proxy_set_header Host $host;
    }

    location ^~ /student {
        proxy_pass         http://student_ui;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_intercept_errors on;
        error_page 404 = @student_spa;
    }

    location @student_spa {
        proxy_pass http://student_ui;
        proxy_set_header Host $host;
    }

    location ^~ /supervisor {
        proxy_pass         http://supervisor_ui;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_intercept_errors on;
        error_page 404 = @supervisor_spa;
    }

    location @supervisor_spa {
        proxy_pass http://supervisor_ui;
        proxy_set_header Host $host;
    }

    location ^~ /center {
        proxy_pass         http://center_ui;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_intercept_errors on;
        error_page 404 = @center_spa;
    }

    location @center_spa {
        proxy_pass http://center_ui;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass         http://portal_ui;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_intercept_errors on;
        error_page 404 = @portal_spa;
    }

    location @portal_spa {
        proxy_pass http://portal_ui;
        proxy_set_header Host $host;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
