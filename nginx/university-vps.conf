# ============================================================================
#  Periyar University — PhD Research Portal
#  Nginx configuration for VPS / bare-metal deployment (no Docker)
#
#  Directory layout assumed on the server:
#    /var/www/phd-portal/dist/           → consolidated frontend build
#    /var/www/phd-portal/dist/admin/     → admin SPA  (VITE_BASE_PATH=/admin/)
#    /var/www/phd-portal/dist/student/   → student SPA
#    /var/www/phd-portal/dist/supervisor/→ supervisor SPA
#    /var/www/phd-portal/dist/center/    → center SPA
#
#  Node backends (managed by PM2):
#    localhost:5000  → student backend
#    localhost:5001  → admin backend
#    localhost:5002  → supervisor backend
#    localhost:5003  → center backend
#
#  Usage:
#    1. Copy to /etc/nginx/sites-available/phd-portal
#    2. sudo ln -s /etc/nginx/sites-available/phd-portal /etc/nginx/sites-enabled/
#    3. Replace YOUR_DOMAIN below with the actual domain
#    4. Run: sudo certbot --nginx -d YOUR_DOMAIN   (for HTTPS)
#    5. sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# ── Rate-limit zones ─────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth_limit:10m     rate=20r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m      rate=300r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=payment_limit:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m  rate=100r/m;

# ── Upstream backend pool ────────────────────────────────────────────────────
upstream student_backend {
    server 127.0.0.1:5000;
    keepalive 16;
}
upstream admin_backend {
    server 127.0.0.1:5001;
    keepalive 16;
}
upstream supervisor_backend {
    server 127.0.0.1:5002;
    keepalive 16;
}
upstream center_backend {
    server 127.0.0.1:5003;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           SAMEORIGIN                                     always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://YOUR_DOMAIN wss://YOUR_DOMAIN; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
        always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml font/woff2;

    # ── Static asset caching ──────────────────────────────────────────────────
    root /var/www/phd-portal/dist;
    client_max_body_size 50m;

    # ═════════════════════════════════════════════════════════════════════════
    #  API ROUTES  (must appear before SPA catch-alls)
    # ═════════════════════════════════════════════════════════════════════════

    # Student API  →  student backend
    location /student/api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass         http://student_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "keep-alive";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Payment callback: allow raw form POST, no buffering
        proxy_request_buffering off;
    }

    # Student auth rate limit (tighter)
    location /student/api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass         http://student_backend/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Payment endpoints (extra restrictive)
    location /student/api/payment/ {
        limit_req zone=payment_limit burst=3 nodelay;
        proxy_pass         http://student_backend/api/payment/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_request_buffering off;
    }

    # File uploads
    location /student/api/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        client_max_body_size 20m;
        proxy_pass         http://student_backend/api/upload;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # Admin API  →  admin backend
    location /admin/api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass         http://admin_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "keep-alive";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
    }

    location /admin/api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass         http://admin_backend/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Admin file uploads
    location /admin/api/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        client_max_body_size 20m;
        proxy_pass         http://admin_backend/api/upload;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # Supervisor API  →  supervisor backend
    location /supervisor/api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass         http://supervisor_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Center API  →  center backend
    location /center/api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass         http://center_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Uploaded files (profile photos, marksheets, etc.)
    location /uploads/ {
        # Served by student backend
        proxy_pass http://student_backend/uploads/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ═════════════════════════════════════════════════════════════════════════
    #  SPA STATIC FILE ROUTING
    #  Order matters: more-specific paths must appear before less-specific ones.
    # ═════════════════════════════════════════════════════════════════════════

    # Hashed static assets — served with long cache (Vite fingerprints them)
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Admin Portal ─────────────────────────────────────────────────────────
    # /admin  →  admin SPA (built with VITE_BASE_PATH=/admin/)
    location ^~ /admin {
        alias /var/www/phd-portal/dist/admin;
        try_files $uri $uri/ /admin/index.html;
        # No caching for index.html so new deployments are picked up
        location = /admin/index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Supervisor Portal ─────────────────────────────────────────────────────
    location ^~ /supervisor {
        alias /var/www/phd-portal/dist/supervisor;
        try_files $uri $uri/ /supervisor/index.html;
        location = /supervisor/index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Center Portal ─────────────────────────────────────────────────────────
    location ^~ /center {
        alias /var/www/phd-portal/dist/center;
        try_files $uri $uri/ /center/index.html;
        location = /center/index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Student Portal ────────────────────────────────────────────────────────
    location ^~ /student {
        alias /var/www/phd-portal/dist/student;
        try_files $uri $uri/ /student/index.html;
        location = /student/index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Portal Dashboard (catch-all / root) ───────────────────────────────────
    location / {
        limit_req zone=general_limit burst=30 nodelay;
        try_files $uri $uri/ /index.html;
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}
