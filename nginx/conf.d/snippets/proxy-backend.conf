# ── Shared proxy headers snippet (included in all backend location blocks) ───

proxy_http_version 1.1;
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        "upgrade";
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

# Disable buffering for streaming/SSE responses
proxy_buffering    off;
proxy_request_buffering off;

# Pass CORS handling to the backend (don't double-add headers)
proxy_hide_header  Access-Control-Allow-Origin;
proxy_hide_header  Access-Control-Allow-Headers;

# Security: prevent backend from adding clickjacking headers again
proxy_hide_header  X-Powered-By;
