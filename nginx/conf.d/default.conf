# ═════════════════════════════════════════════════════════════════════════════
# Default Server — catch-all + health endpoint
# Rejects any request that doesn't match a known virtual host
# ═════════════════════════════════════════════════════════════════════════════

# HTTP health check (used by load balancers and Docker healthcheck)
server {
    listen 80 default_server;
    server_name _;

    location /nginx-health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx"}\n';
        add_header Content-Type application/json;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://student.university.com$request_uri;
    }
}

# HTTPS catch-all — return 444 for unknown hosts (drops connection)
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/default/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/default/privkey.pem;

    return 444;
}
