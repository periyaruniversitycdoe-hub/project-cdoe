# ═════════════════════════════════════════════════════════════════════════════
# Admin Portal — admin.university.com
# Routes:  /         → admin-ui
#          /api/*    → admin-backend
#          /uploads/* → shared uploads (read-only)
# ═════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name admin.university.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.university.com;

    ssl_certificate     /etc/nginx/ssl/admin.university.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/admin.university.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://admin.university.com; frame-ancestors 'self' http://localhost:* http://127.0.0.1:* https://*.trycloudflare.com;" always;

    limit_conn conn_limit 30;

    location /uploads/ {
        alias /var/www/uploads/;
        limit_req zone=web_limit burst=20 nodelay;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options nosniff;
        types { }
        default_type application/octet-stream;
    }

    location ~ ^/api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        include /etc/nginx/conf.d/snippets/proxy-backend.conf;
        proxy_pass http://admin_backend;
    }

    location ~ ^/api/.*/upload {
        limit_req zone=upload_limit burst=5 nodelay;
        client_max_body_size 20m;
        include /etc/nginx/conf.d/snippets/proxy-backend.conf;
        proxy_pass http://admin_backend;
    }

    location /api/ {
        limit_req zone=api_limit burst=80 nodelay;
        include /etc/nginx/conf.d/snippets/proxy-backend.conf;
        proxy_pass http://admin_backend;
    }

    location / {
        limit_req zone=web_limit burst=30 nodelay;
        proxy_pass http://admin_ui;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
