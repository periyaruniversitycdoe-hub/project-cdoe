# ═════════════════════════════════════════════════════════════════════════════
# Redis Configuration — Production
# Used for: sessions, OTP storage, rate limiting, payment state, queues
# ═════════════════════════════════════════════════════════════════════════════

# ── Network ───────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode yes

# ── Authentication ────────────────────────────────────────────────────────────
# Password set via REDIS_PASSWORD env var at startup; see docker-compose.yml
# requirepass set by entrypoint using --requirepass flag

# ── Memory Management ─────────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Persistence — RDB snapshots ───────────────────────────────────────────────
save 900 1      # Save if at least 1 key changed in 15 min
save 300 10     # Save if at least 10 keys changed in 5 min
save 60  10000  # Save if at least 10000 keys changed in 1 min

rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ── Append-Only File (AOF) for durability ────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Slow Log ─────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Connection Limits ─────────────────────────────────────────────────────────
maxclients 1000
tcp-backlog 511
timeout 300
tcp-keepalive 300

# ── Key TTLs for application-specific namespaces (documentation only) ─────────
# otp:{email}          → 300s   (5 minutes)
# session:{token}      → 86400s (24 hours)
# rate:{ip}:{endpoint} → 60s    (per rate-limit window)
# payment:{orderId}    → 1800s  (30 minutes)
# lock:{resource}      → 30s    (distributed lock)

# ── Lazy freeing ─────────────────────────────────────────────────────────────
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Disable dangerous commands in production ─────────────────────────────────
rename-command FLUSHALL  ""
rename-command FLUSHDB   ""
rename-command DEBUG     ""
rename-command CONFIG    "REDIS-CONFIG-PHD"
rename-command SHUTDOWN  "REDIS-SHUTDOWN-PHD"
